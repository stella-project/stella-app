name: Python application

on: [push]

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v2
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v2
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install pytest pytest-cov genbadge[coverage]
        if [ -f web/requirements.txt ]; then pip install -r web/requirements.txt; fi
    - name: Run tests with coverage
      run: |
          pytest --cov=web --cov-report=xml
    - name: Generate coverage badge
      run: genbadge coverage -i coverage.xml -o coverage-badge.svg
    - name: Commit coverage badge
      run: |
        git config user.name "github-actions"
        git config user.email "41898282+github-actions@users.noreply.github.com"
        git add -f coverage-badge.svg coverage.xml
        git commit -m "Update coverage badge and coverage XML [skip ci]" || echo "No changes to commit"
        git push
      if: matrix.python-version == '3.10'

    # - name: Test with pytest
    #   env:
    #     CI: true
    #   run: |
    #     pytest
